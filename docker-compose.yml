version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: production_db
    environment:
      MYSQL_DATABASE: usman_db
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - devops_net

  app:
    build: ./app
    container_name: production_app
    depends_on:
      - db
    networks:
      - devops_net

  nginx:
    image: nginx:latest
    container_name: production_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - devops_net

networks:
  devops_net:
    driver: bridge

volumes:
  mysql_data:
